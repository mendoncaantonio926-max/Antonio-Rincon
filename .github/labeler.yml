backend:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/api/**"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "apps/web/**"
          - "packages/ui/**"
          - "packages/types/**"
          - "packages/config/**"

scripts:
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**"

ci:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "README.md"
          - "CONTRIBUTING.md"
          - "SECURITY.md"
          - "CHANGELOG.md"
          - "docs/**"

infra:
  - changed-files:
      - any-glob-to-any-file:
          - "infra/**"

